name: Deploy Quartz site to GitHub Pages

on:
  push:
    branches:
      - main
    paths:
      # Only rebuild when the published notes, the landing page, or the
      # site machinery change — not on every raw/ or _system/ edit.
      - "concepts/**"
      - "arguments/**"
      - "tensions/**"
      - "definitions/**"
      - "metaphors/**"
      - "sources/**"
      - "references/**"
      - "symbols/**"
      - "maps/**"
      - "authors/**"
      - "books/**"
      - "essays/**"
      - "raw/**"
      - ".site/**"
      - ".github/workflows/deploy.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

defaults:
  run:
    working-directory: .site

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history for git-based note timestamps
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - name: Cache npm
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node-${{ hashFiles('.site/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-
      - name: Cache Quartz plugins
        uses: actions/cache@v4
        with:
          path: .site/.quartz/plugins
          key: ${{ runner.os }}-plugins-${{ hashFiles('.site/quartz.lock.json') }}
          restore-keys: |
            ${{ runner.os }}-plugins-
      - name: Install dependencies
        run: npm ci
      - name: Stage publishable notes (allowlist)
        run: bash ./stage-content.sh
      - name: Install Quartz plugins
        run: npx quartz plugin install
      - name: Build Quartz
        run: npx quartz build
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .site/public

  deploy:
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
